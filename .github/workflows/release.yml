name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Validate version format
        run: |
          TAG="${{ inputs.version }}"
          if ! echo "${TAG}" | grep -qP '^v\d+\.\d+\.\d+$'; then
            echo "Invalid version format: ${TAG} (expected vX.Y.Z)"
            exit 1
          fi
      -
        name: Build and push Docker image
        uses: ./.github/actions/docker-build-push
        with:
          tags: ghcr.io/mtgto/swift-format-action:${{ inputs.version }}
      -
        name: Create release commit and tag
        run: |
          TAG="${{ inputs.version }}"

          sed -i "s|image: 'docker://ghcr.io/mtgto/swift-format-action:.*'|image: 'docker://ghcr.io/mtgto/swift-format-action:${TAG}'|" action.yml

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add action.yml
          git commit -m "Release ${TAG}"

          git tag "${TAG}"
          git push origin "${TAG}"
      -
        name: Create GitHub Release
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
